; NsPrism System Plugin - Admin parameters (it-IT)
PLG_SYSTEM_NSPRISM="System - NsPrism"
PLG_SYSTEM_NSPRISM_DESCRIPTION="Integra la sintassi evidenziata di Prism.js nel frontend Joomla e nell'editor TinyMCE. Include Prism.js v1.30.0 con tutti i linguaggi e i plugin (numeri di riga, copia negli appunti, toolbar). Autonomo e indipendente dal template."

PLG_SYSTEM_NSPRISM_FIELD_LOAD_CSS_LABEL="Carica CSS Tema Prism"
PLG_SYSTEM_NSPRISM_FIELD_LOAD_CSS_DESC="Inietta il foglio di stile del tema Prism per l'evidenziazione della sintassi in ogni pagina."

PLG_SYSTEM_NSPRISM_FIELD_LOAD_LAYOUT_LABEL="Carica CSS Layout"
PLG_SYSTEM_NSPRISM_FIELD_LOAD_LAYOUT_DESC="Inietta il foglio di stile per il layout personalizzato (code-blocks.css) che definisce il contenitore del blocco codice, il gutter dei numeri di riga e la toolbar di copia."

PLG_SYSTEM_NSPRISM_FIELD_USE_MINIFIED_LABEL="Usa JS Minificato"
PLG_SYSTEM_NSPRISM_FIELD_USE_MINIFIED_DESC="Carica prism.min.js invece del file completo prism.js. Consigliato in produzione."

PLG_SYSTEM_NSPRISM_FIELD_THEME_CSS_LABEL="Tema Prism"
PLG_SYSTEM_NSPRISM_FIELD_THEME_CSS_DESC="Seleziona il file CSS del tema Prism da utilizzare per l'evidenziazione della sintassi. Se non selzioni nessun tema devi caricarlo nel tuo template per evidenziare il codice."

PLG_SYSTEM_NSPRISM_FIELD_ENABLE_CLASSES_LABEL="Abilita Classi CSS"
PLG_SYSTEM_NSPRISM_FIELD_ENABLE_CLASSES_DESC="Seleziona quali classi CSS di Prism vengono applicate automaticamente ai blocchi di codice. Ogni classe abilita una funzionalità specifica."
PLG_SYSTEM_NSPRISM_CLASS_LINE_NUMBERS="Numeri di Riga"
PLG_SYSTEM_NSPRISM_CLASS_MATCH_BRACES="Evidenzia Parentesi"
PLG_SYSTEM_NSPRISM_CLASS_RAINBOW_BRACES="Parentesi Colorate"
PLG_SYSTEM_NSPRISM_CLASS_COMMAND_LINE="Riga di Comando"
PLG_SYSTEM_NSPRISM_CLASS_SHOW_LANGUAGE="Mostra Badge Linguaggio"
PLG_SYSTEM_NSPRISM_CLASS_DIFF_HIGHLIGHT="Evidenzia Diff"

PLG_SYSTEM_NSPRISM_FIELD_PATCH_TINYMCE_LANGS_LABEL="Sostituisci Linguaggi TinyMCE"
PLG_SYSTEM_NSPRISM_FIELD_PATCH_TINYMCE_LANGS_DESC="Se abilitato, la lista dei linguaggi nel dialogo Code Sample di TinyMCE viene sostituita con la lista JSON definita sotto. Se disabilitato, TinyMCE usa la sua lista predefinita."

PLG_SYSTEM_NSPRISM_FIELD_LANGUAGES_JSON_LABEL="Linguaggi Code Sample (JSON)"
PLG_SYSTEM_NSPRISM_FIELD_LANGUAGES_JSON_HINT="[{\"text\": \"HTML/XML\", \"value\": \"markup\"}, {\"text\": \"PHP\", \"value\": \"php\"}, ...]"
PLG_SYSTEM_NSPRISM_FIELD_LANGUAGES_JSON_DESC="Array JSON che definisce i linguaggi mostrati nel dialogo Code Sample di TinyMCE. Ogni elemento deve avere \"text\" (nome visualizzato) e \"value\" (identificatore linguaggio Prism). Esempio: [{\"text\": \"PHP\", \"value\": \"php\"}]"

PLG_SYSTEM_NSPRISM_ERROR_INVALID_LANGS_JSON="NsPrism: JSON dei linguaggi Code Sample non valido &mdash; verranno usati i valori predefiniti. %s"
PLG_SYSTEM_NSPRISM_ERROR_JSON_SYNTAX="Errore di sintassi JSON: %s"
PLG_SYSTEM_NSPRISM_ERROR_NOT_ARRAY="Il JSON deve contenere un array al livello radice."
PLG_SYSTEM_NSPRISM_ERROR_EMPTY_ARRAY="L'array dei linguaggi deve contenere almeno un elemento."
PLG_SYSTEM_NSPRISM_ERROR_ITEM_NOT_OBJECT="L'elemento #%d non è un oggetto."
PLG_SYSTEM_NSPRISM_ERROR_ITEM_TEXT="Elemento #%d: \"text\" deve essere una stringa non vuota."
PLG_SYSTEM_NSPRISM_ERROR_ITEM_VALUE="Elemento #%d: \"value\" deve essere una stringa non vuota contenente solo lettere, cifre, trattini, underscore o segni più."
