; NsPrism System Plugin - Admin parameters (en-GB)
PLG_SYSTEM_NSPRISM="System - NsPrism"
PLG_SYSTEM_NSPRISM_DESCRIPTION="Integrates Prism.js syntax highlighting into the Joomla frontend and TinyMCE editor. Bundles Prism.js v1.30.0 with all languages and plugins (line numbers, copy-to-clipboard, toolbar). Self-contained and template-agnostic."

PLG_SYSTEM_NSPRISM_FIELD_LOAD_CSS_LABEL="Load Prism Theme CSS"
PLG_SYSTEM_NSPRISM_FIELD_LOAD_CSS_DESC="Inject the selected Prism syntax-highlight theme CSS into every page."

PLG_SYSTEM_NSPRISM_FIELD_LOAD_LAYOUT_LABEL="Load Layout CSS"
PLG_SYSTEM_NSPRISM_FIELD_LOAD_LAYOUT_DESC="Inject the custom layout stylesheet (code-blocks.css) that styles the code block container, line-number gutter, and copy-to-clipboard toolbar."

PLG_SYSTEM_NSPRISM_FIELD_USE_MINIFIED_LABEL="Use Minified JS"
PLG_SYSTEM_NSPRISM_FIELD_USE_MINIFIED_DESC="Load prism.min.js instead of the full prism.js. Recommended for production."

PLG_SYSTEM_NSPRISM_FIELD_THEME_CSS_LABEL="Prism Theme"
PLG_SYSTEM_NSPRISM_FIELD_THEME_CSS_DESC="Select the Prism CSS theme file to use for syntax highlighting. If you do not select a theme you must load the stylesheet in your template."

PLG_SYSTEM_NSPRISM_FIELD_ENABLE_CLASSES_LABEL="Enable CSS Classes"
PLG_SYSTEM_NSPRISM_FIELD_ENABLE_CLASSES_DESC="Select which Prism CSS classes are automatically applied to code blocks. Each class enables a specific feature."
PLG_SYSTEM_NSPRISM_CLASS_LINE_NUMBERS="Line Numbers"
PLG_SYSTEM_NSPRISM_CLASS_MATCH_BRACES="Match Braces"
PLG_SYSTEM_NSPRISM_CLASS_RAINBOW_BRACES="Rainbow Braces"
PLG_SYSTEM_NSPRISM_CLASS_COMMAND_LINE="Command Line"
PLG_SYSTEM_NSPRISM_CLASS_SHOW_LANGUAGE="Show Language Badge"
PLG_SYSTEM_NSPRISM_CLASS_DIFF_HIGHLIGHT="Diff Highlight"

PLG_SYSTEM_NSPRISM_FIELD_PATCH_TINYMCE_LANGS_LABEL="Override TinyMCE Languages"
PLG_SYSTEM_NSPRISM_FIELD_PATCH_TINYMCE_LANGS_DESC="When enabled, the TinyMCE Code Sample language list is replaced with the JSON list defined below. When disabled, TinyMCE uses its own built-in language list."

PLG_SYSTEM_NSPRISM_FIELD_LANGUAGES_JSON_LABEL="Code Sample Languages (JSON)"
PLG_SYSTEM_NSPRISM_FIELD_LANGUAGES_JSON_DESC="JSON array defining the languages shown in the TinyMCE Code Sample dialog. Each entry must have a \"text\" (display name) and a \"value\" (Prism language identifier). Example: [{\"text\": \"PHP\", \"value\": \"php\"}]"
PLG_SYSTEM_NSPRISM_FIELD_LANGUAGES_JSON_HINT="[{\"text\": \"HTML/XML\", \"value\": \"markup\"}, {\"text\": \"PHP\", \"value\": \"php\"}, ...]"
PLG_SYSTEM_NSPRISM_ERROR_INVALID_LANGS_JSON="NsPrism: Invalid Code Sample Languages JSON &mdash; falling back to defaults. %s"
PLG_SYSTEM_NSPRISM_ERROR_JSON_SYNTAX="JSON syntax error: %s"
PLG_SYSTEM_NSPRISM_ERROR_NOT_ARRAY="Expected a JSON array at the root level."
PLG_SYSTEM_NSPRISM_ERROR_EMPTY_ARRAY="The language array must contain at least one entry."
PLG_SYSTEM_NSPRISM_ERROR_ITEM_NOT_OBJECT="Entry #%d is not an object."
PLG_SYSTEM_NSPRISM_ERROR_ITEM_TEXT="Entry #%d: \"text\" must be a non-empty string."
PLG_SYSTEM_NSPRISM_ERROR_ITEM_VALUE="Entry #%d: \"value\" must be a non-empty string containing only letters, digits, hyphens, underscores or plus signs."
